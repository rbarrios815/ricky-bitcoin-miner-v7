name: Apply event bridge repair

on:
  push:
    branches: ['merge/v6-reward-v7-dashboard-20260701']
    paths: ['.github/workflows/ci.yml']

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Extract repair script
        run: |
          python - <<'PY'
          from pathlib import Path
          lines = Path('.github/workflows/repair-event-bridge.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(lines) if line.strip() == "python - <<'PY'") + 1
          end = next(i for i in range(start, len(lines)) if lines[i].strip() == 'PY')
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines[start:end]) + '\n'
          Path('/tmp/repair_event_bridge.py').write_text(script)
          PY
      - name: Run isolated repair
        run: python /tmp/repair_event_bridge.py > repair-output.txt 2>&1
      - name: Upload repair diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bridge-repair-output
          path: repair-output.txt
          if-no-files-found: error
      - run: git diff --check
      - run: npm run check
      - run: npm test
      - name: Commit repair
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib/stratum-miner.js tests/event_bridge.test.js package.json
          git commit -m 'fix: bridge v6 miner events into v8 server'
          git push origin HEAD:${{ github.ref_name }}
