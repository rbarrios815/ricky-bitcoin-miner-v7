name: Apply reward v8 integration

on:
  push:
    branches:
      - merge/v6-reward-v7-dashboard-20260701
    paths:
      - '.integration/reward-v8.part-*.b64'
      - '.github/workflows/apply-reward-v8.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out integration branch
        uses: actions/checkout@v4
        with:
          ref: merge/v6-reward-v7-dashboard-20260701
          fetch-depth: 0

      - name: Verify and apply tested merged source
        shell: bash
        run: |
          set -euo pipefail

          cat .integration/reward-v8.part-*.b64 | base64 --decode > /tmp/reward-v8.tar.gz
          echo '9456b54ff147e628ac7e85c06ff5679d19364855dcd98082456939f673b94e9c  /tmp/reward-v8.tar.gz' | sha256sum --check --strict

          tar -xzf /tmp/reward-v8.tar.gz

          rm -f index.html app.js app-render.js app-runtime.js miner-worker.js record-utils.js sha256.js server.py
          rm -rf tests tools .integration
          rm -f .github/workflows/apply-reward-v8.yml

          npm run check
          npm test

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A

          if git diff --cached --quiet; then
            echo 'No integration changes to commit.'
            exit 0
          fi

          git commit -m 'feat: merge v6 reward engine with v7 telemetry'
          git push origin HEAD:merge/v6-reward-v7-dashboard-20260701
