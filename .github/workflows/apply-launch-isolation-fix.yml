name: Apply launch isolation fix

on:
  push:
    branches:
      - merge/v6-reward-v7-dashboard-20260701
    paths:
      - .github/workflows/apply-launch-isolation-fix.yml

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Isolate launcher and add visible build marker
        shell: bash
        run: |
          cat > start.command <<'EOF'
          #!/bin/sh
          set -eu
          ROOT_DIR=$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)
          cd "$ROOT_DIR"

          if ! command -v node >/dev/null 2>&1; then
            echo "Node.js 18 or newer is required. Install Node.js, then run start.command again."
            printf '\nPress Return to close.'
            read answer
            exit 1
          fi

          PORT=8792
          export PORT
          echo "Starting corrected Reward Miner build on http://127.0.0.1:${PORT}"
          node server.js &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT INT TERM

          READY=0
          ATTEMPT=0
          while [ "$ATTEMPT" -lt 20 ]; do
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo
              echo "The corrected miner server did not start. Review the error above."
              printf '\nPress Return to close.'
              read answer
              exit 1
            fi
            if curl -fsS "http://127.0.0.1:${PORT}/api/status" >/dev/null 2>&1; then
              READY=1
              break
            fi
            ATTEMPT=$((ATTEMPT + 1))
            sleep 0.25
          done

          if [ "$READY" -ne 1 ]; then
            echo
            echo "The corrected miner did not become ready on port ${PORT}."
            printf '\nPress Return to close.'
            read answer
            exit 1
          fi

          open "http://127.0.0.1:${PORT}/?version=reward-v8-ui-fix2"
          wait "$SERVER_PID"
          EOF
          chmod +x start.command

          python - <<'PY'
          from pathlib import Path

          index_path = Path('public/index.html')
          source = index_path.read_text()
          old = '<p class="subtitle">v6’s real mining engine plus v7’s per-second measurements, persistent record evidence, current-block scope, and CSV export.</p>'
          new = old + '\n      <p class="subtitle"><strong>BUILD: UI/API FIX 2 · LOCAL PORT 8792</strong></p>'
          if source.count(old) != 1:
              raise SystemExit('Expected subtitle marker location exactly once')
          source = source.replace(old, new, 1)
          source = source.replace('/app.js?v=8.0.0', '/app.js?v=8.1-ui-fix2', 1)
          index_path.write_text(source)

          tests_path = Path('tests.js')
          tests_source = tests_path.read_text()
          anchor = "  assert.ok(html.includes('Start reward-eligible attempt'));"
          replacement = anchor + "\n  assert.ok(html.includes('BUILD: UI/API FIX 2 · LOCAL PORT 8792'));\n  const launcherSource = require('fs').readFileSync(require('path').join(__dirname, 'start.command'), 'utf8');\n  assert.ok(launcherSource.includes('PORT=8792'));\n  assert.ok(launcherSource.includes('/api/status'));\n  assert.ok(launcherSource.includes('reward-v8-ui-fix2'));"
          if tests_source.count(anchor) != 1:
              raise SystemExit('Expected tests.js launcher assertion anchor exactly once')
          tests_path.write_text(tests_source.replace(anchor, replacement, 1))
          PY
      - run: npm run check
      - run: npm test
      - name: Commit tested fix and remove one-time workflow
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/apply-launch-isolation-fix.yml
          git add start.command public/index.html tests.js
          git commit -m 'fix: isolate Mac launcher from stale local server'
          git push origin "HEAD:${GITHUB_REF_NAME}"
