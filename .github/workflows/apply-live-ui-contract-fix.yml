name: Apply live UI API contract fix

on:
  push:
    branches:
      - merge/v6-reward-v7-dashboard-20260701
    paths:
      - .github/workflows/apply-live-ui-contract-fix.yml

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Repair browser-to-server contracts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          app_path = Path('public/app.js')
          source = app_path.read_text()

          def replace_once(old, new):
              global source
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one public/app.js match, found {count}: {old[:140]!r}')
              source = source.replace(old, new, 1)

          replace_once(
          """function renderEligibility(status) {
            elements.eligibilityReason.textContent = status.eligibilityReason || 'Unknown eligibility state';
            if (status.rewardEligible) {""",
          """function renderEligibility(status) {
            const eligibility = status.eligibility || {};
            elements.eligibilityReason.textContent = eligibility.reason || 'Unknown eligibility state';
            if (eligibility.eligible) {"""
          )

          replace_once(
          """  if (!status.submissionReady) return 'Submission path unavailable';
            return 'Hashing live reward-eligible work';""",
          """  if (!status.submissionReady) return 'Submission path unavailable';
            if (!status.eligibility?.eligible) return status.eligibility?.reason || 'Waiting for verified live hashing';
            return 'Hashing live reward-eligible work';"""
          )

          replace_once(
          """  try {
              updateStatus(await postJson('/api/start', {
                address: elements.address.value.trim(), worker: elements.workerName.value.trim(), pool: elements.pool.value, threads: Number(elements.threads.value)
              }));
            } catch (error) {""",
          """  try {
              const result = await postJson('/api/start', {
                address: elements.address.value.trim(), worker: elements.workerName.value.trim(), pool: elements.pool.value, threads: Number(elements.threads.value)
              });
              updateStatus(result.state || await requestJson('/api/status'));
            } catch (error) {"""
          )

          replace_once(
          """async function stopMining() {
            try { updateStatus(await postJson('/api/stop')); }
            catch (error) { appendLog({ source: 'error', line: error.message }); }
          }""",
          """async function stopMining() {
            try {
              await postJson('/api/stop');
              updateStatus(await requestJson('/api/status'));
            } catch (error) { appendLog({ source: 'error', line: error.message }); }
          }"""
          )

          replace_once(
          """  try { updateStatus(await postJson('/api/clear-records')); }
            catch (error) { alert(error.message); }""",
          """  try {
              await postJson('/api/clear-records');
              updateStatus(await requestJson('/api/status'));
            } catch (error) { alert(error.message); }"""
          )

          replace_once(
          """    elements.networkStatus.textContent = data.height == null ? `Network height unavailable · ${data.source}` : `Height ${Number(data.height).toLocaleString()} · ${data.source}`;""",
          """    const sourceLabel = Array.isArray(data.sources) && data.sources.length ? data.sources.join(', ') : 'live public sources';
              elements.networkStatus.textContent = data.height == null ? `Network height unavailable · ${sourceLabel}` : `Height ${Number(data.height).toLocaleString()} · ${sourceLabel}`;"""
          )

          replace_once("new EventSource('/events')", "new EventSource('/api/events')")
          replace_once("eventSource.addEventListener('status', event => updateStatus(JSON.parse(event.data)));", "eventSource.addEventListener('state', event => updateStatus(JSON.parse(event.data)));")

          app_path.write_text(source)

          server_path = Path('server.js')
          server_source = server_path.read_text()
          old = """    ...state,
              records: state.records.slice(-500),"""
          new = """    ...state,
              logicalCpus: os.cpus().length || 1,
              records: state.records.slice(-500),"""
          if server_source.count(old) != 1:
              raise SystemExit('Expected publicState object shape was not found exactly once')
          server_path.write_text(server_source.replace(old, new, 1))

          tests_path = Path('tests.js')
          tests_source = tests_path.read_text()
          old_tests = """  assert.ok(appSource.includes('REWARD-ELIGIBLE WORK ACTIVE'));
            assert.ok(html.includes('Best hash · current second'));
            assert.ok(!html.includes('browser SHA-256d demo'));"""
          new_tests = """  assert.ok(appSource.includes('REWARD-ELIGIBLE WORK ACTIVE'));
            assert.ok(appSource.includes("new EventSource('/api/events')"));
            assert.ok(appSource.includes("addEventListener('state'"));
            assert.ok(appSource.includes('status.eligibility || {}'));
            assert.ok(appSource.includes('result.state || await requestJson'));
            assert.ok(!appSource.includes("new EventSource('/events')"));
            assert.ok(html.includes('Best hash · current second'));
            assert.ok(!html.includes('browser SHA-256d demo'));"""
          if tests_source.count(old_tests) != 1:
              raise SystemExit('Expected tests.js UI assertions were not found exactly once')
          tests_path.write_text(tests_source.replace(old_tests, new_tests, 1))
          PY
      - run: npm run check
      - run: npm test
      - name: Commit tested repair and remove one-time workflow
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/apply-live-ui-contract-fix.yml
          git add public/app.js server.js tests.js
          git commit -m 'fix: wire live dashboard to miner API state'
          git push origin "HEAD:${GITHUB_REF_NAME}"
