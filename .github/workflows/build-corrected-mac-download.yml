name: Build corrected Mac miner package

on:
  push:
    branches:
      - merge/v6-reward-v7-dashboard-20260701
    paths:
      - .github/workflows/build-corrected-mac-download.yml

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: d9a3c669d9d5fd88d1176ef4298e9fcd59d20c6b
          path: source
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check corrected source
        working-directory: source
        run: npm run check
      - name: Test corrected source
        working-directory: source
        run: npm test
      - name: Build corrected Mac ZIP
        working-directory: source
        shell: bash
        run: |
          set -eu
          NAME='Ricky-Bitcoin-Reward-Miner-v8-Mac-Fixed'
          mkdir "$NAME"
          cp package.json server.js start.command README.md LICENSE INTEGRATION_STATUS.md SOURCES.md "$NAME"/
          cp -R lib public tests "$NAME"/
          cp tests.js "$NAME"/
          chmod +x "$NAME/start.command"
          cat > "$NAME/START-HERE.txt" <<'EOF'
          RICKY BITCOIN REWARD MINER V8 — CORRECTED LIVE DASHBOARD

          Corrected source commit:
          d9a3c669d9d5fd88d1176ef4298e9fcd59d20c6b

          IMPORTANT: Close the Terminal window for any older copy before starting this one.

          1. Open this corrected folder on your Mac.
          2. Control-click start.command, choose Open, then Open again if macOS asks.
          3. The browser opens http://127.0.0.1:8791/?version=reward-v8
          4. Enter ONLY your PUBLIC Bitcoin mainnet receiving address.
             Never enter a seed phrase, private key, PIN, wallet file, or xpub.
          5. Leave worker name as ricky and start with 1 CPU thread.
          6. Click Start reward-eligible attempt once.
          7. The visible state should advance from Connecting to Subscribing,
             Authorizing, Waiting for live job, and then fresh hashing.
          8. The green badge only activates after a recent positive-count hash batch
             is observed for the current live job and generation.
          9. Keep Terminal open while mining. Use the Stop button before closing it.

          CPU mining is extraordinarily unlikely to find a Bitcoin block and is not
          expected to be profitable. This is a genuine reward-eligible attempt and
          measurement dashboard, not an earnings promise.
          EOF
          zip -r -X "$NAME.zip" "$NAME"
      - uses: actions/upload-artifact@v4
        with:
          name: Ricky-Bitcoin-Reward-Miner-v8-Mac-Fixed
          path: source/Ricky-Bitcoin-Reward-Miner-v8-Mac-Fixed.zip
          if-no-files-found: error
          retention-days: 7
      - uses: actions/checkout@v4
        with:
          ref: merge/v6-reward-v7-dashboard-20260701
          fetch-depth: 0
          path: publisher
      - name: Publish corrected ZIP to immutable commit
        shell: bash
        run: |
          set -eu
          cd publisher
          mkdir -p dist
          cp ../source/Ricky-Bitcoin-Reward-Miner-v8-Mac-Fixed.zip dist/
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dist/Ricky-Bitcoin-Reward-Miner-v8-Mac-Fixed.zip
          if ! git diff --cached --quiet; then
            git commit -m 'build: publish corrected Mac miner package'
            git push origin HEAD:merge/v6-reward-v7-dashboard-20260701
          fi
