name: Apply fresh hashing eligibility fix

on:
  push:
    branches:
      - merge/v6-reward-v7-dashboard-20260701
    paths:
      - .github/workflows/apply-eligibility-fix.yml

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply fail-closed eligibility patch and regression tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          server_path = Path('server.js')
          source = server_path.read_text()

          def replace_once(old, new):
              global source
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one server.js match, found {count}: {old[:120]!r}')
              source = source.replace(old, new, 1)

          replace_once(
          """const MAX_RECORDS = 1000;
          const ALLOWED_POOLS = new Set([""",
          """const MAX_RECORDS = 1000;
          const HASH_FRESHNESS_MS = 5000;
          const ALLOWED_POOLS = new Set(["""
          )

          replace_once(
          """    hashrateHps: 0,
              sessionHashes: 0,""",
          """    hashrateHps: 0,
              lastHashBatchAt: null,
              lastHashJobId: null,
              lastHashGeneration: null,
              lastHashCount: 0,
              sessionHashes: 0,"""
          )

          replace_once(
          """function rewardEligibility() {
            if (!state.running) return { eligible: false, reason: 'Miner stopped' };
            if (!state.connected) return { eligible: false, reason: 'Waiting for pool connection' };
            if (!state.subscribed) return { eligible: false, reason: 'Waiting for Stratum subscription' };
            if (!state.authorized) return { eligible: false, reason: 'Waiting for pool authorization' };
            if (!state.jobId) return { eligible: false, reason: 'Waiting for a live Bitcoin job' };
            if (!state.networkTarget || !state.currentWork) return { eligible: false, reason: 'Live job is not fully constructed' };
            if (!state.submissionReady) return { eligible: false, reason: 'Submission path is not ready' };
            return { eligible: true, reason: 'Authorized live Stratum work with an active submission path' };
          }""",
          """function resetHashEvidence() {
            state.lastHashBatchAt = null;
            state.lastHashJobId = null;
            state.lastHashGeneration = null;
            state.lastHashCount = 0;
          }

          function rewardEligibilityForState(candidate, now = Date.now()) {
            if (!candidate.running) return { eligible: false, reason: 'Miner stopped' };
            if (!candidate.connected) return { eligible: false, reason: 'Waiting for pool connection' };
            if (!candidate.subscribed) return { eligible: false, reason: 'Waiting for Stratum subscription' };
            if (!candidate.authorized) return { eligible: false, reason: 'Waiting for pool authorization' };
            if (!candidate.jobId) return { eligible: false, reason: 'Waiting for a live Bitcoin job' };
            if (!candidate.networkTarget || !candidate.currentWork) return { eligible: false, reason: 'Live job is not fully constructed' };
            if (!candidate.submissionReady) return { eligible: false, reason: 'Submission path is not ready' };
            if (!(Number(candidate.lastHashCount) > 0)) return { eligible: false, reason: 'Waiting for fresh hashing evidence' };
            if (candidate.lastHashJobId !== candidate.jobId) return { eligible: false, reason: 'Waiting for hashing on the current live job' };
            if ((candidate.lastHashGeneration ?? null) !== (candidate.generation ?? null)) {
              return { eligible: false, reason: 'Waiting for hashing on the current job generation' };
            }
            const lastHashBatchAt = Number(candidate.lastHashBatchAt);
            const hashAgeMs = Number(now) - lastHashBatchAt;
            if (!Number.isFinite(lastHashBatchAt) || lastHashBatchAt <= 0 || !Number.isFinite(hashAgeMs) || hashAgeMs < 0 || hashAgeMs > HASH_FRESHNESS_MS) {
              return { eligible: false, reason: 'Waiting for a fresh hash batch' };
            }
            return { eligible: true, reason: 'Authorized live Stratum work with fresh hashing and an active submission path' };
          }

          function rewardEligibility() {
            return rewardEligibilityForState(state);
          }"""
          )

          replace_once(
          """  const count = Number(batch.count) || 0;

            const candidates = Array.isArray(batch.recordCandidates)""",
          """  const count = Number(batch.count) || 0;
            const sameJob = Boolean(state.jobId) && batch.jobId === state.jobId;
            const sameGeneration = (batch.generation ?? null) === (state.generation ?? null);
            if (count > 0 && sameJob && sameGeneration) {
              state.lastHashBatchAt = Date.now();
              state.lastHashJobId = batch.jobId;
              state.lastHashGeneration = batch.generation ?? null;
              state.lastHashCount = count;
            }

            const candidates = Array.isArray(batch.recordCandidates)"""
          )

          replace_once(
          """  state.submissionReady = false;
            state.hashrateHps = 0;
            state.stoppedAt = Date.now();""",
          """  state.submissionReady = false;
            state.hashrateHps = 0;
            resetHashEvidence();
            state.stoppedAt = Date.now();"""
          )

          replace_once(
          """      state.jobId = null;
                state.currentWork = null;
              }
              broadcastState();""",
          """      state.jobId = null;
                state.currentWork = null;
                resetHashEvidence();
              }
              broadcastState();"""
          )

          replace_once(
          """  miner.on('job', job => {
              state.jobId = job.jobId;""",
          """  miner.on('job', job => {
              resetHashEvidence();
              state.jobId = job.jobId;"""
          )

          replace_once(
          """    state.submissionReady = false;
              state.hashrateHps = 0;
              broadcastState();
            });""",
          """    state.submissionReady = false;
              state.hashrateHps = 0;
              resetHashEvidence();
              broadcastState();
            });"""
          )

          replace_once(
          """  rewardEligibility,
            aggregateSecond,""",
          """  rewardEligibility,
            rewardEligibilityForState,
            HASH_FRESHNESS_MS,
            aggregateSecond,"""
          )

          server_path.write_text(source)

          test_path = Path('tests/reward_eligibility.test.js')
          test_path.write_text("""'use strict';

          const assert = require('assert');
          const { rewardEligibilityForState, HASH_FRESHNESS_MS } = require('../server');

          const now = 1_800_000_000_000;
          const ready = {
            running: true,
            connected: true,
            subscribed: true,
            authorized: true,
            jobId: 'job-current',
            generation: 7,
            networkTarget: `0x${'0f'.repeat(32)}`,
            currentWork: { jobId: 'job-current', generation: 7 },
            submissionReady: true,
            lastHashBatchAt: null,
            lastHashJobId: null,
            lastHashGeneration: null,
            lastHashCount: 0
          };

          assert.deepStrictEqual(
            rewardEligibilityForState(ready, now),
            { eligible: false, reason: 'Waiting for fresh hashing evidence' }
          );

          assert.strictEqual(rewardEligibilityForState({
            ...ready,
            lastHashBatchAt: now - 100,
            lastHashJobId: 'old-job',
            lastHashGeneration: 7,
            lastHashCount: 16
          }, now).eligible, false);

          assert.strictEqual(rewardEligibilityForState({
            ...ready,
            lastHashBatchAt: now - 100,
            lastHashJobId: 'job-current',
            lastHashGeneration: 6,
            lastHashCount: 16
          }, now).eligible, false);

          assert.strictEqual(rewardEligibilityForState({
            ...ready,
            lastHashBatchAt: now - HASH_FRESHNESS_MS - 1,
            lastHashJobId: 'job-current',
            lastHashGeneration: 7,
            lastHashCount: 16
          }, now).eligible, false);

          assert.deepStrictEqual(rewardEligibilityForState({
            ...ready,
            lastHashBatchAt: now - 100,
            lastHashJobId: 'job-current',
            lastHashGeneration: 7,
            lastHashCount: 16
          }, now), {
            eligible: true,
            reason: 'Authorized live Stratum work with fresh hashing and an active submission path'
          });

          console.log('Reward eligibility tests passed: fresh positive-count hashing must match the current job and generation.');
          """)

          package_path = Path('package.json')
          package_source = package_path.read_text()
          old_test = '"test": "node tests.js && node tests/event_bridge.test.js"'
          new_test = '"test": "node tests.js && node tests/reward_eligibility.test.js && node tests/event_bridge.test.js"'
          old_check = '"check": "node --check server.js && node --check lib/stratum-miner.js && node --check lib/hash-worker.js && node --check public/app.js && node --check tests/event_bridge.test.js"'
          new_check = '"check": "node --check server.js && node --check lib/stratum-miner.js && node --check lib/hash-worker.js && node --check public/app.js && node --check tests/reward_eligibility.test.js && node --check tests/event_bridge.test.js"'
          if package_source.count(old_test) != 1 or package_source.count(old_check) != 1:
              raise SystemExit('package.json scripts did not match expected branch state')
          package_source = package_source.replace(old_test, new_test, 1).replace(old_check, new_check, 1)
          package_path.write_text(package_source)
          PY
      - run: npm run check
      - run: npm test
      - name: Commit tested patch and remove one-time workflow
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/apply-eligibility-fix.yml
          git add server.js package.json tests/reward_eligibility.test.js
          git commit -m 'fix: require fresh hashing for reward eligibility'
          git push origin "HEAD:${GITHUB_REF_NAME}"
