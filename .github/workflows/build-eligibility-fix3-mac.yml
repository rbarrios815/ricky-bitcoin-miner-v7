name: Build eligibility generation fix 3 package

on:
  push:
    branches:
      - merge/v6-reward-v7-dashboard-20260701
    paths:
      - .github/workflows/build-eligibility-fix3-mac.yml

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: e6ec1168c8af539d228998f1d5d3fc77d5046a41
          path: source
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check tested source
        working-directory: source
        run: npm run check
      - name: Test tested source
        working-directory: source
        run: npm test
      - name: Build Mac ZIP
        working-directory: source
        shell: bash
        run: |
          set -eu
          NAME='Ricky-Bitcoin-Reward-Miner-v8-Mac-Eligibility-Fix-3'
          mkdir "$NAME"
          cp package.json server.js start.command README.md LICENSE INTEGRATION_STATUS.md SOURCES.md "$NAME"/
          cp -R lib public tests "$NAME"/
          cp tests.js "$NAME"/
          chmod +x "$NAME/start.command"
          cat > "$NAME/START-HERE.txt" <<'EOF'
          RICKY BITCOIN REWARD MINER V8 — ELIGIBILITY GENERATION FIX 3

          Tested source commit:
          e6ec1168c8af539d228998f1d5d3fc77d5046a41

          This build fixes the false red eligibility badge caused by the pool-job
          notification having no generation while real hash batches used generation 1.

          1. Stop the current attempt and close its Terminal window.
          2. Close the old browser tab.
          3. Open this new folder.
          4. Control-click start.command, choose Open, then Open again if prompted.
          5. Confirm the browser opens at http://127.0.0.1:8792/
          6. Confirm the header includes BUILD: ELIGIBILITY GENERATION FIX 3.
          7. Enter only your PUBLIC Bitcoin mainnet receiving address.
          8. Leave worker name as ricky and use 1 CPU thread.
          9. Click Start reward-eligible attempt once.
          10. After connection, authorization, constructed live work, and a fresh hash
              batch, the badge should turn green.

          Never enter a seed phrase, private key, PIN, xpub, or wallet file.
          CPU mining is extraordinarily unlikely to find a Bitcoin block and is not
          expected to be profitable.
          EOF
          zip -r -X "$NAME.zip" "$NAME"
      - uses: actions/upload-artifact@v4
        with:
          name: Ricky-Bitcoin-Reward-Miner-v8-Mac-Eligibility-Fix-3
          path: source/Ricky-Bitcoin-Reward-Miner-v8-Mac-Eligibility-Fix-3.zip
          if-no-files-found: error
          retention-days: 7
      - uses: actions/checkout@v4
        with:
          ref: merge/v6-reward-v7-dashboard-20260701
          fetch-depth: 0
          path: publisher
      - name: Publish package to immutable commit
        shell: bash
        run: |
          set -eu
          cd publisher
          mkdir -p dist
          cp ../source/Ricky-Bitcoin-Reward-Miner-v8-Mac-Eligibility-Fix-3.zip dist/
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dist/Ricky-Bitcoin-Reward-Miner-v8-Mac-Eligibility-Fix-3.zip
          if ! git diff --cached --quiet; then
            git commit -m 'build: publish eligibility generation fix 3 package'
            git push origin HEAD:merge/v6-reward-v7-dashboard-20260701
          fi
